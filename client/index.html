<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Viagem Automático</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card">
        <h2>Gerador de Guia 🌍</h2>
        <div class="input-group">
            <input type="text" id="cidade" placeholder="Ex: Paris, Gramado, Toquio...">
        </div>
        <button id="btnGerar">Gerar Guia em PDF</button>

        <div id="resultado" style="display:none;">
            <h3 id="nomeCidade"></h3>
            <div class="weather-badge"><span id="temp"></span>°C</div>
            <p class="info">Dados: <b id="fonte"></b></p>
            
            <div id="statusContainer">
                <div id="statusPdf" class="status-processando">
                    <span class="spinner"></span>
                    <span id="statusTexto">Consultando clima e acionando fila...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
